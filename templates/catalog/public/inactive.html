{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store.business_name|default:"Catalog" }}</title>
    {% if store.logo %}
    <link rel="icon" type="image/png" href="{{ store.logo.url }}">
    {% else %}
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    {% endif %}
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
        p { font-size: 0.875rem; opacity: 0.6; margin: 0; }
    </style>
</head>
<body>
    <div>
        {% if store.logo %}
        <img src="{{ store.logo.url }}" alt="" style="width:64px;height:64px;object-fit:contain;border-radius:12px;margin-bottom:1rem;">
        {% endif %}
        <h1>{{ store.business_name|default:"Catalog" }}</h1>
        <p>{% trans "This catalog is not available at the moment." %}</p>
    </div>
</body>
</html>
